name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: |
          pip install pyinstaller fastapi uvicorn pdfplumber anyio python-multipart pydantic certifi "PyJWT[crypto]"
          pyinstaller tauri/sidecar/schemagic-server.spec \
            --distpath tauri/sidecar \
            --workpath /tmp/schemagic-pyinstaller \
            --noconfirm
          ARCH=$(uname -m)
          case "$ARCH" in
            arm64) TRIPLE="aarch64-apple-darwin" ;;
            x86_64) TRIPLE="x86_64-apple-darwin" ;;
          esac
          mv "tauri/sidecar/schemagic-server" "tauri/sidecar/schemagic-server-${TRIPLE}"
          mkdir -p tauri/binaries
          cp "tauri/sidecar/schemagic-server-${TRIPLE}" "tauri/binaries/"

      - name: Build frontend (static export for Tauri)
        run: |
          cd web
          npm ci
          mv app/api app/_api_server_only || true
          STATIC_EXPORT=1 npm run build
          mv app/_api_server_only app/api || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: U2423P3U9K
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "scheMAGIC ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: |
          pip install pyinstaller fastapi uvicorn pdfplumber anyio python-multipart pydantic certifi "PyJWT[crypto]"
          pyinstaller tauri/sidecar/schemagic-server.spec --distpath tauri/sidecar --workpath C:\Temp\schemagic-pyinstaller --noconfirm
          Rename-Item "tauri\sidecar\schemagic-server.exe" "schemagic-server-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path "tauri\binaries"
          Copy-Item "tauri\sidecar\schemagic-server-x86_64-pc-windows-msvc.exe" "tauri\binaries\"
        shell: pwsh

      - name: Build frontend (static export for Tauri)
        run: |
          cd web
          npm ci
          if (Test-Path app/api) { Rename-Item app/api _api_server_only }
          npm run build
          if (Test-Path app/_api_server_only) { Rename-Item app/_api_server_only api }
        shell: pwsh
        env:
          STATIC_EXPORT: "1"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "scheMAGIC ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: false
