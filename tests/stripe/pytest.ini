[pytest]
minversion = 7.0
testpaths = .
python_files = phase*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    ux: playwright UX smoke tests (run only with --ux)
    slow: tests that take >10s
    serial: must run in one worker (shared state)
    known_fail: expected to fail due to documented bug
    destructive: do not run against prod
